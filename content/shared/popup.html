<div id="booking-popup" class="fixed inset-0 z-[100] flex items-center justify-center p-4 popup-hidden">

<div class="bg-brand rounded-t-2xl p-6 text-center relative"><button class="absolute top-4 right-4 text-white/70 hover:text-white cursor-pointer"><i class="w-6 h-6" data-lucide="x"></i></button>

<div><label class="block text-sm font-medium text-brand mb-1">Téléphone *</label><input class="w-full px-4 py-3 border border-gray-200 rounded-xl text-brand placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand" name="telephone" required="" type="tel" placeholder="06 XX XX XX XX"></div>

</div>

<p class="text-gray-600 mb-6">Je vous recontacte sous 24h.</p>
<button class="bg-brand text-white px-6 py-3 rounded-xl font-medium hover:bg-brand-light cursor-pointer">Fermer</button>

</div>
